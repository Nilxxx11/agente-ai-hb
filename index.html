<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asistente Comercial - Atención al Cliente</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-content">
                <div class="agent-info">
                    <div class="agent-avatar">
                      <img src="logo-hb.png" style="width:55px; height:28px; border-radius:90%;">
                    </div>
                    <div class="agent-details">
                        <h2>HB Y CIA S.A.S</h2>
                        <p class="status">🟢 En línea</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="clearChatBtn" class="icon-btn" title="Limpiar conversación">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <div class="message bot-message">
                    <div class="message-content">
                        👋 ¡Hola! Soy Aiden. Estoy aquí para ayudarte con información sobre nuestros servicios, precios y resolver cualquier duda que tengas. ¿En qué puedo ayudarte hoy?
                    </div>
                    <div class="message-time">Ahora</div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="Escribe tu mensaje..."
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                <span class="char-counter">0/2000</span>
                <span class="info-text">Presiona Enter para enviar, Shift+Enter para nueva línea</span>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Escribiendo respuesta...</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
